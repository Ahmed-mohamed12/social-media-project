  <script>
    const id = +window.location.href.split("=")[1];

    let postNum=document.getElementById("postNum")
    let commentsNum=document.getElementById("commentsNum")
    function getUserDetails(){
        let name=document.getElementById("name")
        let email=document.getElementById("email")
        let userName=document.getElementById("userName")
       
        let header_img=document.getElementById("header-img")
        let profile_name=document.getElementById("profile_name")
        let profile_posts=document.getElementById("profile_posts")
        
        axios.get(`https://tarmeezacademy.com/api/v1/users/${id}`
        ,{
        headers:{
            "authorization": `Bearer ${token}`
        }
    })
    .then((response) => {
        // في حالة النجاح
        name.innerHTML=response.data.data.name
        email.innerHTML=response.data.data.email
        userName.innerHTML=response.data.data.username;
        postNum.innerHTML=response.data.data.posts_count;
        commentsNum.innerHTML=response.data.data.comments_count;
        header_img.src=response.data.data.profile_image;
        profile_name.innerHTML=`${response.data.data.username}'s posts`;
        // profile_posts.innerHTML=`

        // `

    })
    
    .catch((error) => {
        // في حالة الفشل
        console.log("فشل تسجيل الدخول:", error);

        // عرض رسالة خطأ للمستخدم
        showSuccessAlert(error.response.data.message ,"danger")
    })
}
getUserDetails()
function getPosts(){
  
  let profile_posts=document.getElementById("profile_posts")
  
  
  axios.get(`https://tarmeezacademy.com/api/v1/users/${id}/posts`)
  .then((res)=>{
profile_posts.innerHTML=''
        let posts=res.data.data
        posts.map((post)=>{
          let user=getCurentUser()
                let isMyPost=user != null && post.author.id ==user.id
                let editBtn=``
                if(isMyPost){
                    editBtn=`<button type="button" class="btn btn-secondary" style="float:right" onclick="editPost('${encodeURIComponent(JSON.stringify(post))}')">edit</button>`
                    deleteBtn=`<button type="button" class="btn btn-danger" style="float:right;margin-left:5px" onclick="deletePost('${post.id}')">delete</button>`
                    
                }else{
                    editBtn=""
                    deleteBtn=""
                }
            profile_posts.innerHTML+=`
        <div class="card shadow" style="cursor: pointer">
              <div class="card-header">
              
              <img src="${post.author.profile_image}" alt="" 
              style="width: 50px;height: 50px;border-radius: 50%;" class="border border-2"> 
              <b >@${post.author.name}</b>
              ${deleteBtn}
              ${editBtn}
              </div>
              <div class="card-body" onclick="postClicked(${post.id})">
                <img src="${post.image}" id="post-img" alt="img" style="width: 100%;max-width: 100%">
                <h6 style="color: rgb(167, 165, 165);">${post.created_at}</h6>
                <h5 class="card-title">${post.title}</h5>
                <p class="card-text">
                  ${post.body}
                </p>
                <hr>
                  <div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                      <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                    </svg>
                    <span>(${post.comments_count}) comment</span>
                  </div>
              </div>
            </div>
           
        
        `
        getUserDetails()}
        )
    }).catch((err)=>
    console.log(err)
)
}
